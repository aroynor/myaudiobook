name: audiobook-pipeline

services:
  # ---------------------------------------------------------------------
  # CALIBRE - PDF -> EPUB cleanup
  # Manual start only (profile: convert). Provides ebook-convert CLI.
  # ---------------------------------------------------------------------
  calibre:
    image: linuxserver/calibre:latest
    container_name: calibre
    profiles: ["convert"]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./data/calibre-config:/config
      - ./data/pdfs:/books/pdf
      - ./data/epubs:/books/epub
      - ./scripts:/scripts
    ports:
      - "18083:8080"  # web GUI, only needed if you want the visual app
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    restart: "no"

  # ---------------------------------------------------------------------
  # ABOGEN - EPUB -> M4B audiobook via Kokoro TTS
  # Manual start only (profile: convert). Built from source, see README.
  # ---------------------------------------------------------------------
  abogen:
    build:
      context: ./abogen-src
      dockerfile: abogen/webui/Dockerfile
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu   # CPU-only wheel; avoids the huge default CUDA download
    container_name: abogen
    profiles: ["convert"]
    environment:
      - ABOGEN_HOST=0.0.0.0
      - ABOGEN_PORT=8808
      - ABOGEN_UPLOAD_ROOT=/data/uploads
      - ABOGEN_OUTPUT_ROOT=/data/outputs
      - ABOGEN_OUTPUT_DIR=/data/outputs
      - ABOGEN_SETTINGS_DIR=/config
      - ABOGEN_TEMP_DIR=/data/cache
      - ABOGEN_VOICE_CACHE_DIR=/data/voice-cache
      - HF_HOME=/data/huggingface
      - HUGGINGFACE_HUB_CACHE=/data/huggingface/hub
      - ABOGEN_UID=${PUID:-1000}
      - ABOGEN_GID=${PGID:-1000}
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./data/epubs:/data/uploads
      - ./data/audiobooks:/data/outputs
      - ./data/abogen-config:/config
      - ./data/abogen-cache:/data/cache
      - ./data/abogen-voice-cache:/data/voice-cache
      - ./data/abogen-huggingface:/data/huggingface
    ports:
      - "18808:8808"
    deploy:
      resources:
        limits:
          cpus: "3.0"     # leave 1 core free for other containers
          memory: 6g
    restart: "no"

  # ---------------------------------------------------------------------
  # AUDIOBOOKSHELF - library server (manual start, does not auto-start
  # on boot/crash; restart manually after a server reboot)
  # ---------------------------------------------------------------------
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./data/audiobooks:/audiobooks
      - ./data/abs-config:/config
      - ./data/abs-metadata:/metadata
    ports:
      - "19378:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    restart: "no"
